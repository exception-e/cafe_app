version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cafeapp-postgres
    environment:
      POSTGRES_DB: cafe_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db:/docker-entrypoint-initdb.d/
    networks:
      - cafeapp-network
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres -d cafe_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cafeapp
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cafe_app
      DB_USER: postgres
      DB_PASSWORD: 1234
    depends_on:
      postgres:
        condition: service_healthy
    networks:
        - cafeapp-network

volumes:
  postgres_data:

networks:
  cafeapp-network:
    driver: bridge